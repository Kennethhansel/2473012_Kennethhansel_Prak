<!DOCTYPE html>
<html>

<head>
    <title>2473012-Kenneth Hansel</title>
    <script src="jquery-4.0.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        div.kotak {
            width: 40px;
            height: 40px;
            margin: 5px;
            float: left;
            border: 2px blue solid;
            text-align: center;
            background-color: white;
            cursor: pointer;
        }

        .pemisah {
            clear: both;
        }
    </style>
</head>

<body>
    <!-- Ubah warna -->
    <button id="tombolGantiWarna">Change colors</button>

    <div class="pemisah"></div>
    <br>

    <!-- 8 Kotak -->
    <div class="kotak"></div>
    <div class="kotak"></div>
    <div class="kotak"></div>
    <div class="kotak"></div>
    <div class="kotak"></div>
    <div class="kotak"></div>
    <div class="kotak"></div>
    <div class="kotak"></div>

    <script>
        $(document).ready(function () {

            // Klik Salah Satu
            $("div.kotak").click(function () {
                $("div.kotak").css("background-color", "white").removeAttr("id");
                $(this).css("background-color", "red").attr("id", "kotakMerah");
            });

            // Tombol Change colors
            $("#tombolGantiWarna").click(function () {
                $("div.kotak").each(function (index, elemenDOM) {

                    // Ngecek
                    if ($(elemenDOM).attr("id") === "kotakMerah") {
                        return false;
                    }

                    // Jika bukan kotak merah, jadi kuning
                    $(elemenDOM).css("background-color", "yellow");
                });
            });

        });
    </script>

</body>

</html>
