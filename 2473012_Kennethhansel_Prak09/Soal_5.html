<!DOCTYPE html>
<html>

<head>
    <title>2473012-Kenneth Hansel</title>
    <script src="jquery-4.0.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .wadah-aplikasi {
            background-color: #f5f5f5;
            border: 1px solid #ccc;
            padding: 15px;
            width: 300px;
            border-radius: 5px;
        }

        input[type="text"] {
            width: 90%;
            padding: 5px;
            margin-bottom: 15px;
        }

        .nama-perusahaan {
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

    <div class="wadah-aplikasi">
        <!-- Input search -->
        <input type="text" id="kolomCari">

        <!-- Daftar -->
        <div id="daftarPerusahaan">
            <div class="nama-perusahaan">Sun Microsystem</div>
            <div class="nama-perusahaan">Apache Software Foundation</div>
            <div class="nama-perusahaan">Oracle Coorporation</div>
            <div class="nama-perusahaan">International Bussiness Machines</div>
            <div class="nama-perusahaan">Microsoft Coorporation</div>
            <div class="nama-perusahaan">Apple Inc</div>
            <div class="nama-perusahaan">Sap Ag</div>
            <div class="nama-perusahaan">Accenture</div>
            <div class="nama-perusahaan">Computer Sciences Coorporation</div>
            <div class="nama-perusahaan">Google</div>
            <div class="nama-perusahaan">Softbank</div>
            <div class="nama-perusahaan">Yahoo</div>
        </div>
    </div>

    <script>
        $(document).ready(function () {

            $("#kolomCari").keyup(function () {

                // Ambil huruf/kata yang baru diketik
                var kataKunci = $(this).val();

                $("#daftarPerusahaan .nama-perusahaan").css("color", "black");

                // Cek
                if (kataKunci !== "") {
                    $("#daftarPerusahaan .nama-perusahaan:contains('" + kataKunci + "')").css("color", "red");
                }

            });

        });
    </script>

</body>

</html>
