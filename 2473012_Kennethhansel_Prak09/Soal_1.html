<!DOCTYPE html>
<html>

<head>
    <title>2473012-Kenneth Hansel</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        ol.menu-utama {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
        }

        li.kotak-menu {
            background-color: #ff1493;
            color: white;
            margin-right: 15px;
            padding: 5px 10px;
            width: 140px;
            cursor: pointer;
            position: relative;
            box-sizing: border-box;
        }

        li.kotak-menu ol {
            list-style-type: none;
            padding: 5px 10px;
            margin: 0;
            background-color: white;
            border: 2px solid #ff1493;
            position: absolute;
            top: 100%;
            left: 0;
            width: 140px;
            box-sizing: border-box;
        }

        li.kotak-menu ol li {
            color: black;
            text-decoration: underline;
            margin-bottom: 3px;
        }
    </style>

    <script src="jquery-4.0.0.min.js"></script>
</head>

<body>

    <ol class="menu-utama">
        <li class="kotak-menu">jQuery
            <ol>
                <li>Download</li>
                <li>Documentation</li>
                <li>Blog</li>
            </ol>
        </li>
        <li class="kotak-menu">Community
            <ol>
                <li>Mailing List</li>
                <li>Tutorials</li>
                <li>Demos</li>
                <li>Plugins</li>
            </ol>
        </li>
        <li class="kotak-menu">Development
            <ol>
                <li>Source Code</li>
                <li>Bug Tracking</li>
                <li>Recent Changes</li>
            </ol>
        </li>
    </ol>

    <script>
        $(document).ready(function () {
            /* Sembunyiin semua anak menu */
            $("li.kotak-menu ol").hide();

            /* Atur interaksi mouse */
            $("li.kotak-menu").hover(
                function () {
                    /* Mouse Masuk */
                    $(this).find("ol").show();
                },
                function () {
                    /* Mouse Keluar */
                    $(this).find("ol").hide();
                }
            );
        });
    </script>

</body>

</html>
