<!DOCTYPE html>
<html>

<head>
    <title>2473012-Kenneth Hansel</title>
    <script src="jquery-4.0.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        table {
            border-collapse: collapse;
        }

        td {
            padding: 10px;
        }
    </style>
</head>

<body>

    <table border="1" cellpadding="0" cellspacing="0">
        <tr>
            <td width="50" align="center">
                <!-- Checkbox Header -->
                <input class="header" type="checkbox" /><br />
                <hr />
                <!-- Checkbox Bawah -->
                <input class="body" type="checkbox" /><br />
                <input class="body" type="checkbox" /><br />
                <input class="body" type="checkbox" /><br />
                <input class="body" type="checkbox" /><br />
            </td>
        </tr>
    </table>

    <script>
        $(document).ready(function () {

            // Check box ketika di klik
            $(".header").click(function () {
                var apakahTercentang = $(this).prop("checked");

                if (apakahTercentang === true) {
                    $("input:checkbox.body").prop("checked", true);
                } else {
                    $("input:checkbox.body").prop("checked", false);
                }

            });

        });
    </script>

</body>

</html>
