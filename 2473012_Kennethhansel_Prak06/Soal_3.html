<!DOCTYPE html>
<html>

<head>
    <title>2473012-Kenneth Hansel</title>
    <style>
        body {
            padding: 20px;
        }

        .kotak-input {
            border: 1px solid #ccc;
            padding: 10px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
        }

        .kotak-out {
            border: 1px solid #999;
            padding: 5px;
            display: inline-block;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
        }

        table {
            border-collapse: collapse;
        }

        .bata-oranye {
            background-color: orange;
            border: 1px solid white;
        }

        .bata-kosong {
            background-color: transparent;
            border: none;
        }

        button {
            margin-top: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="kotak-input">
        Tinggi Piramida: <input type="number" id="tinggi" min="1"><br>
        <button onclick="buatPiramida()">proses</button>
    </div>

    <br>

    <div class="kotak-out" id="tempat-piramida" style="display: none;">
    </div>

    <script>
        function buatPiramida() {
            // 1. Ambil nilai tinggi
            var inputUser = document.getElementById("tinggi").value;
            var t = parseInt(inputUser);

            // Tamnbahan validasi kalau ga diisi
            if (isNaN(t) || t <= 0) {
                alert("Masukkan angka tinggi piramida yang valid.");
                return;
            }

            // 2. Munculin kotak output
            document.getElementById("tempat-piramida").style.display = "inline-block";

            // 3. Mulai membuat tabel
            var kodeTabel = "<table width='800' height='600'>";

            // Rumus
            var totalKolom = (2 * t) - 1;
            var titikTengah = t;

            // 4. Looping Baris
            for (var baris = 1; baris <= t; baris++) {
                kodeTabel += "<tr>";

                // Looping Kolom
                for (var kolom = 1; kolom <= totalKolom; kolom++) {
                    var batasKiri = titikTengah - baris + 1;
                    var batasKanan = titikTengah + baris - 1;

                    if (kolom >= batasKiri && kolom <= batasKanan) {
                        kodeTabel += "<td class='bata-oranye'></td>";
                    } else {
                        kodeTabel += "<td class='bata-kosong'></td>";
                    }
                }

                kodeTabel += "</tr>";
            }

            kodeTabel += "</table>";

            // 5. Tampil ke dalam div
            document.getElementById("tempat-piramida").innerHTML = kodeTabel;
        }
    </script>

</body>

</html>
