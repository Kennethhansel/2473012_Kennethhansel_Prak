<!DOCTYPE html>
<html>

<head>
    <title>2473012-Kenneth Hansel</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 50px;
        }

        /* Navigasi Utama */
        nav ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        /* Menu Horizontal */
        nav>ul>li {
            float: left;
            margin-right: 3px;
            position: relative;
        }

        /* Styling Link */
        nav a {
            display: block;
            text-decoration: none;
            color: black;
            padding: 8px 30px;

            border: 2px dotted grey;
            background-color: white;
            text-align: center;
            min-width: 80px;
        }

        /* Mouse Over Background hitam, tulisan putih  */
        nav a:hover {
            background-color: black;
            color: white;
        }

        /* NEWS SUB */
        .submenu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            z-index: 10;
        }

        /* Menghilangkan margin/padding */
        .submenu ul {
            padding: 0;
            margin: 0;
        }

        .submenu li a {
            border-top: none;
        }

        nav li:hover .submenu {
            display: block;
        }
    </style>
</head>

<body>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li>
                <a href="#">News</a>
                <div class="submenu">
                    <ul>
                        <li><a href="#">Sports</a></li>
                        <li><a href="#">Music</a></li>
                        <li><a href="#">Movie</a></li>
                    </ul>
                </div>
            </li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">About</a></li>
        </ul>
    </nav>

</body>

</html>
