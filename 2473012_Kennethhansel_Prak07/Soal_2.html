<!DOCTYPE html>
<html>

<head>
    <title>2473012-Kenneth Hansel</title>
    <style>
        table {
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            border: 1px solid #ffffff;
            padding: 8px;
        }

        /* Baris Warna Hijau Atas */
        th {
            background-color: #92b092;
            font-weight: normal;
        }

        /* Baris Warna Biru */
        .warna-biru {
            background-color: #a4c2f4;
        }

        /* Baris Warna Orange */
        .warna-oranye {
            background-color: #f6b26b;
        }

        /* Warna Mouse Over */
        .c3 {
            background-color: #CCFFAA;
        }
    </style>
</head>

<body>

    <table>
        <tr>
            <th>Position</th>
            <th>Programming Language</th>
            <th>Ratings</th>
        </tr>
        <tr class="warna-biru" onmouseover="this.className='c3'" onmouseout="this.className='warna-biru'">
            <td>1</td>
            <td>C</td>
            <td>18.058%</td>
        </tr>
        <tr class="warna-oranye" onmouseover="this.className='c3'" onmouseout="this.className='warna-oranye'">
            <td>2</td>
            <td>Java</td>
            <td>18.051%</td>
        </tr>
        <tr class="warna-biru" onmouseover="this.className='c3'" onmouseout="this.className='warna-biru'">
            <td>3</td>
            <td>C++</td>
            <td>9.707%</td>
        </tr>
        <tr class="warna-oranye" onmouseover="this.className='c3'" onmouseout="this.className='warna-oranye'">
            <td>4</td>
            <td>PHP</td>
            <td>9.662%</td>
        </tr>
        <tr class="warna-biru" onmouseover="this.className='c3'" onmouseout="this.className='warna-biru'">
            <td>5</td>
            <td>(Visual) Basic</td>
            <td>6.392%</td>
        </tr>
    </table>

</body>

</html>
